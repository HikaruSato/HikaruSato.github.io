  <style>
    :root{

      --card:rgba(255,255,255,0.06);

      --text:#edf2ff;
      --muted:#b7c0d8;
      --accent:#ff6b57;
      --accent2:#8b5cf6;
      --radius:20px;
      --max:900px;
    }
    
    *{box-sizing:border-box}
    
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:

      radial-gradient(circle at top right,rgba(139,92,246,.20),transparent 32%),
      linear-gradient(180deg,#0b1020,#111a33);
      color:var(--text);
      line-height:1.7;
    }
    
    .container{
      width:min(calc(100% - 32px),var(--max));
      margin:auto;
    }
    
    .hero{
      padding:80px 0 40px;
      text-align:center;
    }
    
    h1{

      margin:0 0 16px;

    }
    
    .tagline{
      color:var(--muted);
      font-size:18px;
    }
    
    .section{
      margin-top:40px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:28px;
    }
    
    .section h2{
      margin-top:0;
    }
    
    .section p{
      color:var(--muted);
    }
    
    .email{
      font-size:18px;
      margin-top:10px;
    }
    
    .email a{
      color:#ffd1cb;
      text-decoration:none;
    }
    
    .email a:hover{
      text-decoration:underline;
    }
    
    .footer{
      padding:40px 0 60px;
      text-align:center;
      color:#aab5d3;
      font-size:14px;
    }
    
    .links{
      margin-bottom:14px;
    }
    
    .links a{
      margin:0 10px;
      color:#ffd1cb;
      text-decoration:none;
    }
    
    .links a:hover{
      text-decoration:underline;
    }
